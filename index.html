<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AURA FARM 🌱 — der Pop-Culture-Grind</title>
<meta name="description" content="Gamifizierte Pop-Culture-Checkliste für Lehrer:innen. Farm Aura, versteh deine Schüler:innen.">
<meta name="theme-color" content="#0b0b16">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#0b0b16; --bg2:#11111f; --card:#15152400; --ink:#f1f0fa; --muted:#9b99b3;
  --grad:linear-gradient(120deg,#a855f7,#22d3ee 55%,#a3e635);
  --s:#c9ff3d; --a:#3de4ff; --b:#b07cff; --c:#9aa0ab;
  --radius:20px; --nav-h:62px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;overflow-x:hidden}
body{
  margin:0;color:var(--ink);background:var(--bg);overflow-x:hidden;
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background-image:
    radial-gradient(900px 500px at 85% -10%,rgba(168,85,247,.22),transparent 60%),
    radial-gradient(700px 420px at -10% 12%,rgba(34,211,238,.13),transparent 60%),
    radial-gradient(800px 600px at 50% 110%,rgba(163,230,53,.08),transparent 60%);
  background-attachment:fixed;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
}
button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}
input,select{font:inherit}
.wrap{max-width:760px;margin:0 auto;padding:0 14px;box-sizing:border-box;width:100%}

/* ---------- header ---------- */
header{padding:18px 0 6px}
.logo-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
h1{
  margin:0;font-size:clamp(28px,7vw,40px);font-weight:900;letter-spacing:.5px;line-height:1;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 18px rgba(168,85,247,.45));
}
h1 .leaf{-webkit-text-fill-color:initial}
.subtitle{margin:4px 0 0;color:var(--muted);font-size:13px;letter-spacing:.4px}
#modeToggle{
  flex:none;min-height:44px;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);transition:.2s;
}
#modeToggle:active{transform:scale(.96)}

/* ---------- stats ---------- */
#stats{
  margin-top:14px;border-radius:24px;padding:16px;position:relative;overflow:hidden;
  background:linear-gradient(150deg,rgba(168,85,247,.16),rgba(34,211,238,.10) 50%,rgba(163,230,53,.10));
  border:1px solid rgba(255,255,255,.12);
}
#stats::after{content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 75% 20%,rgba(255,255,255,.10),transparent 45%);pointer-events:none}
.stats-top{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap}
.aura-big{font-size:clamp(40px,11vw,58px);font-weight:900;line-height:1;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.aura-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.level-box{text-align:right}
.level-title{font-size:17px;font-weight:800}
.streak{font-size:13px;color:var(--muted);margin-top:3px}
.bar{height:10px;border-radius:99px;background:rgba(255,255,255,.10);margin-top:14px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:var(--grad);transition:width .5s ease;box-shadow:0 0 12px rgba(163,230,53,.6)}
.bar-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}

/* ---------- controls ---------- */
#controls{position:sticky;top:0;z-index:30;background:linear-gradient(var(--bg) 75%,transparent);padding:10px 0 4px;margin-top:6px}
.ctl-row{display:flex;gap:8px;margin-bottom:8px}
#search{
  flex:1;min-height:44px;padding:10px 14px;border-radius:14px;color:var(--ink);
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);outline:none;
}
#search::placeholder{color:var(--muted)}
#search:focus{border-color:rgba(168,85,247,.7)}
#sortSel{
  min-height:44px;max-width:46%;padding:10px 8px;border-radius:14px;color:var(--ink);
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);outline:none;
}
#sortSel option{background:#1a1a2c;color:var(--ink)}
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip-btn{
  flex:none;min-height:38px;padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);color:var(--muted);
  transition:.15s;white-space:nowrap;
}
.chip-btn.on{background:linear-gradient(120deg,rgba(168,85,247,.35),rgba(34,211,238,.3));color:#fff;border-color:rgba(168,85,247,.7)}
.chip-btn:active{transform:scale(.95)}

/* ---------- cards ---------- */
#list{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.card{
  position:relative;border-radius:var(--radius);overflow:hidden;
  background:linear-gradient(140deg,hsl(var(--h) 45% 16% /.92),hsl(var(--h) 40% 9% /.92));
  border:1px solid hsl(var(--h) 50% 38% /.45);
  transition:transform .12s ease, box-shadow .2s;
}
.card.done{opacity:.78}
.card.done .card-title{text-decoration:line-through;text-decoration-color:rgba(255,255,255,.4);text-decoration-thickness:2px}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--tc)}
.card-main{display:flex;gap:12px;padding:13px 13px 13px 16px;align-items:flex-start}
.poster{
  flex:none;width:54px;height:54px;border-radius:16px;display:grid;place-items:center;font-size:30px;
  background:hsl(var(--h) 55% 24% /.7);border:1px solid hsl(var(--h) 55% 45% /.4);
}
.card-body{flex:1;min-width:0;cursor:pointer}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;align-items:center}
.tier-pill{font-size:10.5px;font-weight:900;letter-spacing:.5px;padding:3px 8px;border-radius:99px;color:#0b0b16;background:var(--tc)}
.mini{font-size:11px;color:var(--muted);background:rgba(255,255,255,.07);padding:3px 8px;border-radius:99px;white-space:nowrap}
.card-title{margin:0;font-size:15.5px;font-weight:800;line-height:1.25;word-wrap:break-word}
.teach{margin:5px 0 0;font-size:12.5px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-side{flex:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.checkbtn{
  width:48px;height:48px;border-radius:16px;border:2px solid hsl(var(--h) 60% 55% /.6);
  display:grid;place-items:center;font-size:22px;color:transparent;transition:.18s;background:rgba(255,255,255,.04);
}
.checkbtn.on{background:var(--grad);color:#0b0b16;border-color:transparent;box-shadow:0 0 16px rgba(163,230,53,.55)}
.pts{font-size:11.5px;font-weight:800;color:var(--tc)}
.pro-stamp{
  position:absolute;top:10px;right:64px;transform:rotate(8deg);
  font-size:10px;font-weight:900;letter-spacing:1px;padding:4px 9px;border-radius:8px;
  background:rgba(163,230,53,.18);border:1.5px solid var(--s);color:var(--s);
  text-shadow:0 0 8px rgba(163,230,53,.8);
}
.subbar{
  display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:44px;
  padding:8px 14px;border-top:1px dashed hsl(var(--h) 50% 40% /.4);width:100%;
  font-size:13px;font-weight:700;color:var(--muted);
}
.subbar .prog{color:var(--ink)}
.subbar .arr{transition:transform .2s}
.card.exp .subbar .arr{transform:rotate(180deg)}
.subs{display:none;padding:2px 14px 12px;flex-direction:column;gap:6px}
.card.exp .subs{display:flex}
.sub{
  border-radius:14px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);overflow:hidden;
}
.sub-row{display:flex;align-items:center;gap:10px;padding:8px 10px;min-height:48px}
.subcheck{
  flex:none;width:34px;height:34px;border-radius:11px;border:2px solid rgba(255,255,255,.3);
  display:grid;place-items:center;font-size:16px;color:transparent;transition:.15s;
}
.subcheck.on{background:var(--grad);color:#0b0b16;border-color:transparent}
.sub-task{flex:1;font-size:13.5px;font-weight:600;cursor:pointer;line-height:1.3}
.sub-q{flex:none;width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.08);color:var(--muted);font-weight:800}
.sub-how{display:none;padding:0 12px 10px;font-size:12.5px;color:var(--muted);line-height:1.45}
.sub.how-open .sub-how{display:block}
.sub.done .sub-task{text-decoration:line-through;opacity:.65}

/* ---------- quests ---------- */
.quest{
  border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;position:relative;overflow:hidden;
  background:linear-gradient(140deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.12);
}
.quest.done{border-color:rgba(163,230,53,.55);background:linear-gradient(140deg,rgba(163,230,53,.12),rgba(34,211,238,.06))}
.quest h3{margin:0 0 4px;font-size:16px}
.quest p{margin:0 0 8px;font-size:12.5px;color:var(--muted);line-height:1.4}
.quest .q-meta{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:700}
.quest .q-badge{color:var(--s)}
.quest .bar{margin-top:8px}

/* ---------- profile ---------- */
.panel{
  border-radius:var(--radius);padding:16px;margin-bottom:14px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);
}
.panel h3{margin:0 0 10px;font-size:15px;letter-spacing:.3px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat-cell{border-radius:14px;padding:12px;background:rgba(0,0,0,.25);text-align:center}
.stat-cell b{display:block;font-size:22px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat-cell span{font-size:11.5px;color:var(--muted)}
.badges{display:flex;flex-wrap:wrap;gap:8px}
.badge{
  font-size:12px;font-weight:700;padding:8px 12px;border-radius:12px;
  background:rgba(163,230,53,.13);border:1px solid rgba(163,230,53,.5);color:#dfffa3;
}
.badge.locked{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:var(--muted);opacity:.6;filter:grayscale(1)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:46px;padding:10px 18px;
  border-radius:14px;font-weight:800;font-size:14px;transition:.15s;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
}
.btn:active{transform:scale(.96)}
.btn.primary{background:var(--grad);color:#0b0b16;border:0}
.btn.danger{background:rgba(255,80,80,.12);border-color:rgba(255,80,80,.5);color:#ff9a9a}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
#importArea{width:100%;min-height:70px;border-radius:12px;background:rgba(0,0,0,.3);color:var(--ink);border:1px solid rgba(255,255,255,.15);padding:10px;margin:8px 0;font-size:12px}

/* ---------- nav ---------- */
#tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:50;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  display:flex;background:rgba(13,13,24,.92);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.1);
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:11px;font-weight:700;color:var(--muted)}
.tab .ico{font-size:21px}
.tab.on{color:#fff}
.tab.on .ico{filter:drop-shadow(0 0 8px rgba(163,230,53,.8))}

/* ---------- sheet ---------- */
#sheetWrap{position:fixed;inset:0;z-index:80}
#sheetBg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px)}
#sheet{
  position:absolute;left:0;right:0;bottom:0;max-height:86vh;overflow-y:auto;
  background:#15152a;border-radius:26px 26px 0 0;border-top:1px solid rgba(255,255,255,.18);
  padding:10px 18px calc(24px + env(safe-area-inset-bottom));
  animation:up .25s ease;
}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.sheet-grip{width:44px;height:5px;border-radius:99px;background:rgba(255,255,255,.25);margin:4px auto 14px}
.sheet-head{display:flex;gap:14px;align-items:center;margin-bottom:12px}
.sheet-head .poster{width:64px;height:64px;font-size:36px}
.sheet-head h2{margin:0;font-size:19px;line-height:1.25}
.sheet-sec{margin:14px 0}
.sheet-sec h4{margin:0 0 6px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.sheet-sec p{margin:0;font-size:14px;line-height:1.5}
.pack-list{margin:0;padding-left:20px;font-size:13.5px;line-height:1.7;color:var(--ink)}

/* ---------- toast / fx ---------- */
#toasts{position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);z-index:90;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{
  max-width:88vw;padding:11px 18px;border-radius:14px;font-size:13.5px;font-weight:700;text-align:center;
  background:rgba(20,20,38,.95);border:1px solid rgba(168,85,247,.6);box-shadow:0 6px 24px rgba(0,0,0,.5);
  animation:toast-in .25s ease, toast-out .3s ease 2.4s forwards;
}
@keyframes toast-in{from{transform:translateY(14px);opacity:0}}
@keyframes toast-out{to{transform:translateY(8px);opacity:0}}
.spark{position:fixed;z-index:95;pointer-events:none;font-size:16px;animation:fly .8s ease-out forwards}
@keyframes fly{to{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}}
#levelup{
  position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:radial-gradient(circle at 50% 45%,rgba(168,85,247,.55),rgba(11,11,22,.96) 70%);
  backdrop-filter:blur(4px);text-align:center;padding:30px;animation:toast-in .3s ease;
}
#levelup .big{font-size:64px;animation:pulse 1s infinite alternate}
@keyframes pulse{to{transform:scale(1.15);filter:drop-shadow(0 0 24px rgba(163,230,53,.9))}}
#levelup h2{font-size:30px;margin:0;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
#levelup p{color:var(--ink);font-size:17px;font-weight:700;margin:0}
.empty-msg{text-align:center;color:var(--muted);padding:40px 20px;font-size:14.5px;line-height:1.6}
.section-h{margin:18px 0 12px;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
[hidden]{display:none !important}
@media(min-width:700px){
  .card-title{font-size:17px}
  #list{gap:14px}
}
</style>
</head>

<div class="wrap">
  <header>
    <div class="logo-row">
      <div>

          <div class="streak" id="streakLine"></div>

      </div>
      <div class="bar"><i id="levelBar"></i></div>
      <div class="bar-meta"><span id="levelNext"></span><span id="pctDone"></span></div>
    </div>
  </header>

  <main>
    <section id="view-grind">
      <div id="controls">
        <div class="ctl-row">
          <input id="search" type="search" autocomplete="off">

        <div id="importBox" hidden>

          <button class="btn primary" id="importBtn"></button>
        </div>
      </div>
      <div class="panel">
        <button class="btn danger" id="resetBtn"></button>
      </div>
    </section>
  </main>
</div>

<nav id="tabs">
  <button class="tab on" data-view="grind"><span class="ico">🌱</span><span id="tabGrind">Grind</span></button>
  <button class="tab" data-view="quests"><span class="ico">🏆</span><span>Quests</span></button>
  <button class="tab" data-view="profil"><span class="ico">🧑‍🌾</span><span id="tabProfil">Profil</span></button>
</nav>

<div id="sheetWrap" hidden>
  <div id="sheetBg"></div>
  <div id="sheet"></div>
</div>
<div id="toasts"></div>
<div id="levelup" hidden></div>

/* ============ STATE ============ */
const LS_KEY="aura-farm-state-v1";
let state={checked:{},subs:{},slang:true,streak:0,lastDay:null,prevLevel:0};
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){const s=JSON.parse(raw);if(s&&typeof s==="object")state=Object.assign(state,s);}
  }catch(e){}
}
function saveState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}
}
function T(){return state.slang?TXT.slang:TXT.normal;}

/* ============ DERIVED ============ */
function gameFullyDone(item){
  return item.subChecks&&item.subChecks.length>0&&item.subChecks.every(s=>state.subs[s.id]);
}
function questDone(q){
  if(q.type==="games")return GAMES.every(gameFullyDone);
  return q.items.every(id=>state.checked[id]);
}
function questProgress(q){
  if(q.type==="games")return[GAMES.filter(gameFullyDone).length,GAMES.length];
  return[q.items.filter(id=>state.checked[id]).length,q.items.length];
}
function computeAura(){
  let a=0;
  for(const it of CATALOG){
    if(state.checked[it.id])a+=it.points;
    if(it.subChecks){
      for(const s of it.subChecks)if(state.subs[s.id])a+=s.points;
      if(gameFullyDone(it))a+=FULL_GAME_BONUS;
    }
  }
  for(const q of QUESTS)if(questDone(q))a+=q.bonus;
  return a;
}
function levelFor(aura){
  let lv=0;
  for(let i=0;i<LEVELS.length;i++)if(aura>=LEVELS[i].min)lv=i;
  return lv;
}
function doneCount(){return CATALOG.filter(i=>state.checked[i.id]).length;}
function earnedBadges(){
  const out=[];
  for(const q of QUESTS)out.push({id:"q-"+q.id,label:q.emoji+" "+q.badge,on:questDone(q)});
  for(const g of GAMES)out.push({id:"g-"+g.id,label:"🎮 Pro: "+shortTitle(g.title),on:gameFullyDone(g)});
  const mediums=[...new Set(CATALOG.map(i=>i.medium))];
  for(const m of mediums){
    const items=CATALOG.filter(i=>i.medium===m);
    out.push({id:"m-"+m,label:MEDIA[m].e+" "+MEDIA[m].n+" komplett",on:items.every(i=>state.checked[i.id])});
  }
  return out;
}
function shortTitle(t){return t.split("(")[0].trim();}

/* ============ HELPERS ============ */
const $=s=>document.querySelector(s);
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmt(tpl,map){let s=tpl;for(const k in map)s=s.replace("{"+k+"}",map[k]);return s;}
function toast(msg){
  const el=document.createElement("div");
  el.className="toast";el.textContent=msg;
  $("#toasts").appendChild(el);
  setTimeout(()=>el.remove(),2900);
}
function sparkle(x,y){
  const glyphs=["✨","⭐","💫","🌟","🌱"];
  for(let i=0;i<10;i++){
    const s=document.createElement("span");
    s.className="spark";s.textContent=glyphs[Math.floor(Math.random()*glyphs.length)];
    s.style.left=(x-8)+"px";s.style.top=(y-8)+"px";
    s.style.setProperty("--dx",(Math.random()*140-70)+"px");
    s.style.setProperty("--dy",(-40-Math.random()*100)+"px");
    s.style.setProperty("--rot",(Math.random()*240-120)+"deg");
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),850);
  }
}
function bigSparkle(){
  for(let i=0;i<3;i++)setTimeout(()=>sparkle(innerWidth*Math.random(),innerHeight*0.4*Math.random()+80),i*120);
}
function showLevelUp(title){
  const el=$("#levelup");
  el.innerHTML='<div class="big">🗿</div><h2>'+esc(T().levelHead)+'</h2><p>'+esc(fmt(T().levelMsg,{t:title}))+'</p>';
  el.hidden=false;
  bigSparkle();
  const hide=()=>{el.hidden=true;el.onclick=null;};
  el.onclick=hide;
  setTimeout(hide,2800);
}
function animateAura(from,to){
  const el=$("#auraNum");
  const dur=450,t0=performance.now();
  function step(t){
    const k=Math.min(1,(t-t0)/dur);
    el.textContent=Math.round(from+(to-from)*(1-Math.pow(1-k,3)));
    if(k<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ============ STREAK ============ */
function bumpStreak(){
  const today=new Date().toISOString().slice(0,10);
  if(state.lastDay===today)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  state.streak=(state.lastDay===y)?state.streak+1:1;
  state.lastDay=today;
}

/* ============ ACTIONS ============ */
let lastAura=0;
function afterChange(fxPos){
  const beforeQuests=null; // quests evaluated below via diff sets
  saveState();
  const aura=computeAura();
  const lv=levelFor(aura);
  if(lv>state.prevLevel){
    state.prevLevel=lv;saveState();
    showLevelUp(LEVELS[lv].t);
  }else if(lv<state.prevLevel){
    state.prevLevel=lv;saveState();
  }
  renderStats();renderActiveView();
  animateAura(lastAura,aura);
  lastAura=aura;
}
function questSnapshot(){return QUESTS.filter(questDone).map(q=>q.id);}
function toggleItem(id,ev){
  const item=CATALOG.find(i=>i.id===id);
  if(!item)return;
  const was=!!state.checked[id];
  const qBefore=questSnapshot();
  if(was){delete state.checked[id];}
  else{state.checked[id]=true;bumpStreak();}
  const qAfter=questSnapshot();
  if(!was){
    const msgs=T().checkedMsgs;
    const isPack=item.medium==="pack"||(item.packItems&&item.packItems.length);
    toast(fmt(isPack?T().packMsg:msgs[Math.floor(Math.random()*msgs.length)],{p:item.points}));
    if(ev)sparkle(ev.clientX||innerWidth/2,ev.clientY||innerHeight/2);
  }else{
    toast(fmt(T().uncheckMsg,{p:item.points}));
  }
  for(const qid of qAfter)if(!qBefore.includes(qid)){
    const q=QUESTS.find(x=>x.id===qid);
    setTimeout(()=>{toast(fmt(T().questMsg,{b:q.bonus}));bigSparkle();},450);
  }
  afterChange();
}
function toggleSub(itemId,subId,ev){
  const item=CATALOG.find(i=>i.id===itemId);
  if(!item)return;
  const was=!!state.subs[subId];
  const fullBefore=gameFullyDone(item);
  const qBefore=questSnapshot();
  if(was){delete state.subs[subId];}
  else{state.subs[subId]=true;bumpStreak();}
  if(!was){
    toast(T().subMsg);
    if(ev)sparkle(ev.clientX||innerWidth/2,ev.clientY||innerHeight/2);
    if(!fullBefore&&gameFullyDone(item))setTimeout(()=>{toast(T().proMsg);bigSparkle();},350);
  }else{
    toast(T().subUnMsg);
  }
  const qAfter=questSnapshot();
  for(const qid of qAfter)if(!qBefore.includes(qid)){
    const q=QUESTS.find(x=>x.id===qid);
    setTimeout(()=>{toast(fmt(T().questMsg,{b:q.bonus}));bigSparkle();},700);
  }
  afterChange();
}

/* ============ FILTER / SORT ============ */
const filter={medium:null,block:null,quick:{essential:false,fast:false,open:true,games:false},search:"",sort:"tier"};
let vibeOrder=null;
const expanded=new Set();
function visibleItems(){
  let items=CATALOG.slice();
  if(filter.medium)items=items.filter(i=>i.medium===filter.medium);
  if(filter.block)items=items.filter(i=>i.block===filter.block);
  if(filter.quick.essential)items=items.filter(i=>i.tier==="S");
  if(filter.quick.fast)items=items.filter(i=>i.estMinutes<=15);
  if(filter.quick.open)items=items.filter(i=>!state.checked[i.id]);
  if(filter.quick.games)items=items.filter(i=>i.medium==="game");
  if(filter.search){
    const q=filter.search.toLowerCase();
    items=items.filter(i=>
      i.title.toLowerCase().includes(q)||
      i.teachUse.toLowerCase().includes(q)||
      (i.packItems||[]).join(" ").toLowerCase().includes(q)
    );
  }
  const tierRank={S:0,A:1,B:2,C:3};
  if(filter.sort==="time")items.sort((a,b)=>a.estMinutes-b.estMinutes);
  else if(filter.sort==="aura")items.sort((a,b)=>b.points-a.points);
  else if(filter.sort==="tier")items.sort((a,b)=>tierRank[a.tier]-tierRank[b.tier]||a.estMinutes-b.estMinutes);
  else if(filter.sort==="vibe"&&vibeOrder)items.sort((a,b)=>vibeOrder.indexOf(a.id)-vibeOrder.indexOf(b.id));
  return items;
}

/* ============ RENDER ============ */
function renderStats(){
  const t=T();
  const aura=computeAura();
  const lv=levelFor(aura);
  $("#auraNum").textContent=aura;
  $("#levelTitle").textContent=LEVELS[lv].t;
  $("#streakLine").textContent=state.streak>0?fmt(t.streak,{n:state.streak}):t.streakZero;
  const next=LEVELS[lv+1];
  if(next){
    const span=next.min-LEVELS[lv].min;
    $("#levelBar").style.width=Math.min(100,Math.round((aura-LEVELS[lv].min)/span*100))+"%";
    $("#levelNext").textContent=fmt(t.nextLevel,{n:next.min-aura,t:next.t});
  }else{
    $("#levelBar").style.width="100%";
    $("#levelNext").textContent=t.maxLevel;
  }
  $("#pctDone").textContent=fmt(t.pctDone,{p:Math.round(doneCount()/CATALOG.length*100)});
  $("#subtitle").textContent=t.subtitle;
  $("#modeToggle").textContent=t.modeBtn;
}
function cardHTML(item){
  const t=T();
  const m=MEDIA[item.medium];
  const checked=!!state.checked[item.id];
  const full=item.subChecks?gameFullyDone(item):false;
  const isExp=expanded.has(item.id);
  let chips='<span class="tier-pill">'+item.tier+'</span>'
    +'<span class="mini">'+m.e+' '+m.n+'</span>'
    +'<span class="mini">⏱ '+item.estMinutes+' min</span>'
    +'<span class="mini">'+(DOSE_CHIP[item.dose]||item.dose)+'</span>';
  if(item.packItems)chips+='<span class="mini">📦 '+item.packItems.length+'</span>';
  let subsHtml="";
  if(item.subChecks){
    const done=item.subChecks.filter(s=>state.subs[s.id]).length;
    subsHtml='<button class="subbar" data-exp="'+item.id+'">'
      +'<span>🎮 '+esc(t.subsLabel)+' <span class="prog">'+done+'/'+item.subChecks.length+' '+esc(t.experienced)+'</span></span>'
      +'<span class="arr">▾</span></button>'
      +'<div class="subs">'
      +item.subChecks.map(s=>{
        const on=!!state.subs[s.id];
        return '<div class="sub'+(on?" done":"")+'" data-sub-wrap="'+s.id+'">'
          +'<div class="sub-row">'
          +'<button class="subcheck'+(on?" on":"")+'" data-subcheck="'+item.id+'|'+s.id+'">✓</button>'
          +'<span class="sub-task" data-how="'+s.id+'">'+esc(s.task)+'</span>'
          +'<button class="sub-q" data-how="'+s.id+'">?</button>'
          +'</div>'
          +'<div class="sub-how">💡 '+esc(s.how)+'</div>'
          +'</div>';
      }).join("")
      +'</div>';
  }
  return '<article class="card'+(checked?" done":"")+(isExp?" exp":"")+'" style="--h:'+m.h+';--tc:'+TIER_COLOR[item.tier]+'" data-card="'+item.id+'">'
    +(full?'<div class="pro-stamp">'+esc(t.proStamp)+' 🎮</div>':"")
    +'<div class="card-main">'
    +'<div class="poster">'+m.e+'</div>'
    +'<div class="card-body" data-open="'+item.id+'">'
    +'<div class="chip-row">'+chips+'</div>'
    +'<h3 class="card-title">'+esc(item.title)+'</h3>'
    +'<p class="teach">📚 '+esc(item.teachUse)+'</p>'
    +'</div>'
    +'<div class="card-side">'
    +'<button class="checkbtn'+(checked?" on":"")+'" data-check="'+item.id+'" aria-label="abhaken">✓</button>'
    +'<span class="pts">+'+item.points+'</span>'
    +'</div>'
    +'</div>'
    +subsHtml
    +'</article>';
}
function renderList(){
  const items=visibleItems();
  const t=T();
  if(!items.length){
    $("#list").innerHTML='<div class="empty-msg">'+esc(doneCount()===0&&!filter.search?t.empty:t.noResults)+'</div>';
    return;
  }
  $("#list").innerHTML=items.map(cardHTML).join("");
}
function renderQuests(){
  const t=T();
  $("#questsHead").textContent=t.questsHead;
  $("#questList").innerHTML=QUESTS.map(q=>{
    const[d,n]=questProgress(q);
    const done=questDone(q);
    return '<div class="quest'+(done?" done":"")+'">'
      +'<h3>'+q.emoji+' '+esc(q.name)+(done?" ✅":"")+'</h3>'
      +'<p>'+esc(q.desc)+'</p>'
      +'<div class="q-meta"><span class="q-badge">🏅 '+esc(q.badge)+'</span><span>+'+q.bonus+' · '+d+'/'+n+'</span></div>'
      +'<div class="bar"><i style="width:'+Math.round(d/n*100)+'%"></i></div>'
      +'</div>';
  }).join("");
}
function renderProfil(){
  const t=T();
  $("#profilHead").textContent=t.profilHead;
  $("#badgesHead").textContent=t.badgesHead;
  $("#dataHead").textContent=t.dataHead;
  $("#exportBtn").textContent=t.exportBtn;
  $("#importToggleBtn").textContent=t.importToggle;
  $("#importBtn").textContent=t.importBtn;
  $("#resetBtn").textContent=t.resetBtn;
  const aura=computeAura();
  $("#statGrid").innerHTML=
    '<div class="stat-cell"><b>'+aura+'</b><span>'+esc(t.statAura)+'</span></div>'
    +'<div class="stat-cell"><b>'+doneCount()+'/'+CATALOG.length+'</b><span>'+esc(t.statItems)+'</span></div>'
    +'<div class="stat-cell"><b>'+Math.round(doneCount()/CATALOG.length*100)+'%</b><span>'+esc(t.statPct)+'</span></div>'
    +'<div class="stat-cell"><b>'+state.streak+' 🔥</b><span>'+esc(t.statStreak)+'</span></div>';
  const badges=earnedBadges();
  $("#badgeShelf").innerHTML=badges.map(b=>'<span class="badge'+(b.on?"":" locked")+'">'+esc(b.label)+'</span>').join("");
}
function renderControls(){
  const t=T();
  $("#search").placeholder=t.searchPh;
  const sortSel=$("#sortSel");
  sortSel.innerHTML=["tier","time","aura","vibe"].map(k=>'<option value="'+k+'"'+(filter.sort===k?" selected":"")+'>'+esc(t.sort[k==="time"?"time":k==="aura"?"aura":k==="vibe"?"vibe":"tier"])+'</option>').join("");
  const q=t.quick;
  $("#quickChips").innerHTML=
    ['essential','fast','open','games'].map(k=>'<button class="chip-btn'+(filter.quick[k]?" on":"")+'" data-quick="'+k+'">'+esc(q[k])+'</button>').join("")
    +'<button class="chip-btn" data-random="1">'+esc(q.random)+'</button>';
  $("#mediumChips").innerHTML=
    '<button class="chip-btn'+(filter.medium===null?" on":"")+'" data-medium="">Alle</button>'
    +Object.keys(MEDIA).filter(m=>CATALOG.some(i=>i.medium===m)).map(m=>
      '<button class="chip-btn'+(filter.medium===m?" on":"")+'" data-medium="'+m+'">'+MEDIA[m].e+' '+MEDIA[m].n+'</button>'
    ).join("");
  $("#blockChips").innerHTML=
    '<button class="chip-btn'+(filter.block===null?" on":"")+'" data-block="">'+(state.slang?"🧩 Alle Blöcke":"🧩 Alle Fächer")+'</button>'
    +Object.keys(BLOCKS).filter(b=>CATALOG.some(i=>i.block===b)).map(b=>
      '<button class="chip-btn'+(filter.block===b?" on":"")+'" data-block="'+b+'">'+BLOCKS[b]+' '+b+'</button>'
    ).join("");
}
let activeView="grind";
function renderActiveView(){
  if(activeView==="grind")renderList();
  else if(activeView==="quests")renderQuests();
  else renderProfil();
}
function renderAll(){
  renderStats();renderControls();renderList();renderQuests();renderProfil();
}

/* ============ SHEET ============ */
function openSheet(id){
  const item=CATALOG.find(i=>i.id===id);
  if(!item)return;
  const t=T();
  const m=MEDIA[item.medium];
  const checked=!!state.checked[item.id];
  let linkHtml="";
  if(item.url){
    linkHtml='<a class="btn primary" href="'+esc(item.url)+'" target="_blank" rel="noopener">'+esc(t.openLabel)+'</a>';
  }else{
    linkHtml='<span class="btn" style="cursor:default">'+esc(item.platform||"—")+'</span>'
      +'<a class="btn" href="https://www.google.com/search?q='+encodeURIComponent(shortTitle(item.title))+'" target="_blank" rel="noopener">'+esc(t.searchLabel)+'</a>';
  }
  let packHtml="";
  if(item.packItems){
    packHtml='<div class="sheet-sec"><h4>'+esc(t.packHead)+' ('+item.packItems.length+')</h4><ul class="pack-list">'
      +item.packItems.map(p=>'<li>'+esc(p)+'</li>').join("")+'</ul></div>';
  }
  let subsHtml="";
  if(item.subChecks){
    subsHtml='<div class="sheet-sec"><h4>🎮 '+esc(t.subsLabel)+'</h4><div class="subs" style="display:flex;padding:0">'
      +item.subChecks.map(s=>{
        const on=!!state.subs[s.id];
        return '<div class="sub'+(on?" done":"")+'">'
          +'<div class="sub-row">'
          +'<button class="subcheck'+(on?" on":"")+'" data-subcheck="'+item.id+'|'+s.id+'">✓</button>'
          +'<span class="sub-task">'+esc(s.task)+'</span>'
          +'</div>'
          +'<div class="sub-how" style="display:block">💡 '+esc(s.how)+'</div>'
          +'</div>';
      }).join("")+'</div></div>';
  }
  $("#sheet").innerHTML=
    '<div class="sheet-grip"></div>'
    +'<div class="sheet-head">'
    +'<div class="poster" style="--h:'+m.h+';background:hsl('+m.h+' 55% 24% / .7);border:1px solid hsl('+m.h+' 55% 45% / .4)">'+m.e+'</div>'
    +'<div><div class="chip-row"><span class="tier-pill" style="--tc:'+TIER_COLOR[item.tier]+';background:'+TIER_COLOR[item.tier]+'">'+item.tier+' · '+esc(t.tier[item.tier])+'</span></div>'
    +'<h2>'+esc(item.title)+'</h2></div>'
    +'</div>'
    +'<div class="chip-row">'
    +'<span class="mini">'+m.e+' '+m.n+'</span>'
    +'<span class="mini">⏱ '+item.estMinutes+' min</span>'
    +'<span class="mini">💎 +'+item.points+'</span>'
    +'<span class="mini">🧩 '+esc(item.block)+'</span>'
    +'</div>'
    +'<div class="sheet-sec"><h4>'+esc(t.teachHead)+'</h4><p>📚 '+esc(item.teachUse)+'</p></div>'
    +'<div class="sheet-sec"><h4>'+esc(t.doseHead)+'</h4><p>'+(DOSE_CHIP[item.dose]||"")+' — '+esc(item.doseLabel)+'</p></div>'
    +packHtml+subsHtml
    +'<div class="sheet-sec btn-row">'
    +'<button class="btn '+(checked?"":"primary")+'" data-check="'+item.id+'" data-sheet-check="1">'+(checked?"✓ "+(state.slang?"abgehakt — unchecken?":"erledigt — rückgängig?"):"✅ "+(state.slang?"Claim +"+item.points+" Aura":"Abhaken (+"+item.points+")"))+'</button>'
    +linkHtml
    +'</div>';
  $("#sheetWrap").hidden=false;
  document.body.style.overflow="hidden";
  $("#sheet").dataset.item=id;
}
function closeSheet(){
  $("#sheetWrap").hidden=true;
  document.body.style.overflow="";
}

/* ============ EVENTS ============ */
document.addEventListener("click",(ev)=>{
  const el=ev.target.closest("[data-check],[data-subcheck],[data-open],[data-exp],[data-how],[data-quick],[data-medium],[data-block],[data-random],.tab");
  if(!el)return;
  if(el.dataset.check!==undefined&&el.dataset.check!==""){
    toggleItem(el.dataset.check,ev);
    if(el.dataset.sheetCheck)openSheet(el.dataset.check);
    return;
  }
  if(el.dataset.subcheck){
    const[itemId,subId]=el.dataset.subcheck.split("|");
    toggleSub(itemId,subId,ev);
    if(el.closest("#sheet"))openSheet(itemId);
    return;
  }
  if(el.dataset.open){openSheet(el.dataset.open);return;}
  if(el.dataset.exp){
    const id=el.dataset.exp;
    if(expanded.has(id))expanded.delete(id);else expanded.add(id);
    renderList();return;
  }
  if(el.dataset.how){
    const wrap=document.querySelector('[data-sub-wrap="'+el.dataset.how+'"]');
    if(wrap)wrap.classList.toggle("how-open");
    return;
  }
  if(el.dataset.quick){
    filter.quick[el.dataset.quick]=!filter.quick[el.dataset.quick];
    renderControls();renderList();return;
  }
  if(el.dataset.medium!==undefined){
    filter.medium=el.dataset.medium||null;
    renderControls();renderList();return;
  }
  if(el.dataset.block!==undefined){
    filter.block=el.dataset.block||null;
    renderControls();renderList();return;
  }
  if(el.dataset.random){
    const cands=CATALOG.filter(i=>i.estMinutes<=15&&!state.checked[i.id]);
    if(!cands.length){toast(T().randomEmpty);return;}
    openSheet(cands[Math.floor(Math.random()*cands.length)].id);
    return;
  }
  if(el.classList.contains("tab")){
    activeView=el.dataset.view;
    document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b===el));
    $("#view-grind").hidden=activeView!=="grind";
    $("#view-quests").hidden=activeView!=="quests";
    $("#view-profil").hidden=activeView!=="profil";
    renderActiveView();
    return;
  }
});
$("#sheetBg").addEventListener("click",closeSheet);
$("#search").addEventListener("input",e=>{filter.search=e.target.value.trim();renderList();});
$("#sortSel").addEventListener("change",e=>{
  filter.sort=e.target.value;
  if(filter.sort==="vibe")vibeOrder=CATALOG.map(i=>i.id).sort(()=>Math.random()-0.5);
  renderList();
});
$("#modeToggle").addEventListener("click",()=>{
  state.slang=!state.slang;saveState();renderAll();
});
$("#exportBtn").addEventListener("click",()=>{
  const data=JSON.stringify(state);
  const done=()=>toast(T().exportOk);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(data).then(done).catch(()=>{prompt("Copy:",data);done();});
  }else{prompt("Copy:",data);done();}
});
$("#importToggleBtn").addEventListener("click",()=>{
  $("#importBox").hidden=!$("#importBox").hidden;
});
$("#importBtn").addEventListener("click",()=>{
  try{
    const s=JSON.parse($("#importArea").value);
    if(!s||typeof s!=="object"||!s.checked)throw 0;
    state=Object.assign({checked:{},subs:{},slang:true,streak:0,lastDay:null,prevLevel:0},s);
    saveState();
    lastAura=computeAura();
    renderAll();
    toast(T().importOk);
    $("#importBox").hidden=true;
  }catch(e){toast(T().importErr);}
});
$("#resetBtn").addEventListener("click",()=>{
  if(!confirm(T().resetConfirm))return;
  try{localStorage.removeItem(LS_KEY);}catch(e){}
  state={checked:{},subs:{},slang:state.slang,streak:0,lastDay:null,prevLevel:0};
  saveState();lastAura=0;
  expanded.clear();
  renderAll();
});

/* ============ INIT ============ */
loadState();
state.prevLevel=levelFor(computeAura());
saveState();
lastAura=computeAura();
renderAll();
if("serviceWorker"in navigator&&location.protocol.startsWith("http")){
  try{navigator.serviceWorker.register("sw.js");}catch(e){}
}
</script>
</body>
</html>
